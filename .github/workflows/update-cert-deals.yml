name: Update IT Certification Deals Daily

on:
  schedule:
    # Run every day at 9 AM UTC
    - cron: '0 9 * * *'

  workflow_dispatch:
    inputs:
      force_commit:
        description: 'Force commit even if no new deal news found'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write

jobs:
  check-cert-deals:
    runs-on: ubuntu-latest
    outputs:
      deals_found: ${{ steps.search_deals.outputs.deals_found }}
      update_date:  ${{ steps.search_deals.outputs.update_date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml python-dateutil

      - name: Generate README from active deals
        run: python scripts/generate_readme.py

      - name: Search for IT Certification Deals
        id: search_deals
        run: python scripts/daily_cert_deals.py

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"

          git pull --rebase origin main

          git add README.md cert-deals-update.md data/deals.json

          if git diff --staged --quiet; then
            echo "✅ No changes to commit — everything is up to date."
          else
            git commit -m "🤖 Daily cert deals update — $(date +'%Y-%m-%d')

Sources checked:
- Microsoft Learn (TechCommunity RSS)
- AWS Training & Certification Blog
- Google Cloud Blog
- CompTIA Blog
- (ISC)² Blog
- Linux Foundation Blog
- Cisco Learning Network

🤖 Generated by GitHub Actions"
            git push
          fi

  notify-completion:
    needs: check-cert-deals
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Summary
        run: |
          echo "🎉 IT Certification Deals check completed!"
          echo "Status:      ${{ needs.check-cert-deals.result }}"
          echo "Date:        $(date +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Deals found: ${{ needs.check-cert-deals.outputs.deals_found || '0' }}"
          echo "Next run:    $(date -d '+1 day' +'%Y-%m-%d') at 9:00 AM UTC"
